<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITUATSION MARKAZ | BEK_BOLA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: #f8fafc; }
        .digital { font-family: 'Orbitron', sans-serif; }
        .alert-card { animation: fadeInUp 0.4s ease-out; border-left-width: 10px; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center bg-slate-900 p-8 rounded-[40px] border border-slate-800 shadow-2xl mb-10">
            <div class="mb-6 md:mb-0 text-center md:text-left">
                <h1 class="text-2xl font-black text-blue-500 tracking-[0.2em] uppercase digital">Situatsion Markaz</h1>
                <p class="text-slate-500 text-xs mt-1 uppercase tracking-widest">Bek_Bola Monitoring Tizimi</p>
            </div>
            <div class="flex gap-6">
                <div class="bg-slate-800 p-5 rounded-3xl text-center min-w-[120px] border border-slate-700">
                    <p class="text-[10px] text-slate-500 uppercase mb-1">🆘 SOS</p>
                    <p id="s-count" class="text-3xl font-bold text-red-500 digital">0</p>
                </div>
                <div class="bg-slate-800 p-5 rounded-3xl text-center min-w-[120px] border border-slate-700">
                    <p class="text-[10px] text-slate-500 uppercase mb-1">🚑 AMBULANCE</p>
                    <p id="a-count" class="text-3xl font-bold text-blue-500 digital">0</p>
                </div>
            </div>
        </header>

        <div id="display" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full text-center py-20 text-slate-700 animate-pulse text-xl uppercase tracking-widest">Bog'lanish kutilmoqda...</div>
        </div>
    </div>

    <script>
        const DB_URL = "https://bek-bola-default-rtdb.europe-west1.firebasedatabase.app/murojaatlar.json";

        async function loadData() {
            try {
                const response = await fetch(DB_URL);
                const data = await response.json();
                const box = document.getElementById('display');
                
                let sCount = 0; let aCount = 0;

                if (!data) {
                    box.innerHTML = `<div class="col-span-full text-center py-20 opacity-30 text-xl italic font-light">Hozircha faol murojaatlar yo'q</div>`;
                    document.getElementById('s-count').innerText = 0;
                    document.getElementById('a-count').innerText = 0;
                    return;
                }

                box.innerHTML = "";
                // Eng yangi murojaat tepada bo'lishi uchun
                const sortedKeys = Object.keys(data).sort((a, b) => (data[b].timestamp || 0) - (data[a].timestamp || 0));

                sortedKeys.forEach(id => {
                    const item = data[id];
                    const isSOS = item.type === 'SOS';
                    if (isSOS) sCount++; else aCount++;

                    const card = document.createElement('div');
                    card.className = `alert-card bg-slate-900 p-8 rounded-[35px] border-2 shadow-2xl relative overflow-hidden ${isSOS ? 'border-red-600' : 'border-blue-600'}`;
                    
                    card.innerHTML = `
                        <div class="flex justify-between items-center mb-6">
                            <span class="text-[10px] bg-slate-800 px-3 py-1 rounded-full text-slate-400 font-mono tracking-tighter">${item.time}</span>
                            <button onclick="deleteMsg('${id}')" class="text-slate-600 hover:text-red-400 font-black transition-colors">O'CHIRISH</button>
                        </div>
                        <h2 class="text-3xl font-black mb-6 flex items-center gap-3">
                            ${isSOS ? '🆘 SOS' : '🚑 TEZ YORDAM'}
                        </h2>
                        <div class="space-y-4">
                            <div class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Koordinatalar:</div>
                            <p class="text-xs font-mono text-slate-400 -mt-3">${item.lat}, ${item.lon}</p>
                            <a href="https://www.google.com/maps?q=${item.lat},${item.lon}" target="_blank" 
                               class="block w-full text-center bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl transition-all shadow-lg active:scale-95 uppercase tracking-tighter text-sm">
                               📍 XARITADA KO'RISH
                            </a>
                        </div>
                    `;
                    box.appendChild(card);
                });

                document.getElementById('s-count').innerText = sCount;
                document.getElementById('a-count').innerText = aCount;

            } catch (error) {
                console.error("Xatolik:", error);
            }
        }

        async function deleteMsg(id) {
            if(!confirm("Ushbu murojaatni arxivlamoqchimisiz?")) return;
            const url = `https://bek-bola-default-rtdb.europe-west1.firebasedatabase.app/murojaatlar/${id}.json`;
            await fetch(url, { method: 'DELETE' });
            loadData();
        }

        // Har 5 soniyada yangilash
        setInterval(loadData, 5000);
        loadData();
    </script>
</body>
</html>
