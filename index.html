<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEK_BOLA ADMIN | MONITORING</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 15px; margin: 0; }
        .header { background: #1e293b; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; border-bottom: 4px solid #0a5cff; }
        .stats { display: flex; gap: 10px; margin-bottom: 20px; }
        .stat-box { flex: 1; background: #1e293b; padding: 15px; border-radius: 12px; text-align: center; font-weight: bold; }
        .alert-card { background: #1e293b; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 8px solid #ef4444; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn-map { background: #22c55e; color: white; padding: 10px 15px; border-radius: 8px; text-decoration: none; display: inline-block; margin-top: 10px; font-weight: bold; }
        .error-msg { background: #450a0a; color: #fca5a5; padding: 15px; border-radius: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0;">🛰 BEK_BOLA SITUATSION MARKAZ</h2>
</div>

<div class="stats">
    <div class="stat-box" style="border-bottom: 4px solid #ef4444;">SOS: <span id="s-count">0</span></div>
    <div class="stat-box" style="border-bottom: 4px solid #3b82f6;">TEZ YORDAM: <span id="a-count">0</span></div>
</div>

<div id="display">Yuklanmoqda...</div>

<script>
    // URLni oxirida .json borligiga va to'g'riligiga ishonch hosil qiling
    const DB_URL = "https://bek-bola-default-rtdb.europe-west1.firebasedatabase.app";

    async function loadData() {
        try {
            const response = await fetch(DB_URL);
            if (!response.ok) throw new Error("Serverdan noto'g'ri javob keldi");
            
            const data = await response.json();
            const box = document.getElementById('display');
            
            let sCount = 0;
            let aCount = 0;

            if (!data) {
                box.innerHTML = "<p style='text-align:center; opacity:0.5;'>Hozircha murojaatlar yo'q.</p>";
                return;
            }

            box.innerHTML = "";
            Object.keys(data).reverse().forEach(id => {
                const item = data[id];
                if (item.type === 'SOS') sCount++; else aCount++;

                const card = document.createElement('div');
                card.className = 'alert-card';
                if (item.type === 'TEZ_YORDAM') card.style.borderColor = '#3b82f6';
                
                card.innerHTML = `
                    <div style="font-size:12px; opacity:0.6;">🕒 ${item.time}</div>
                    <div style="font-size:18px; margin:5px 0;"><b>${item.type === 'SOS' ? '🆘 SOS' : '🚑 TEZ YORDAM'}</b></div>
                    <div style="font-size:14px;">Koordinata: ${item.lat}, ${item.lon}</div>
                    <a href="https://www.google.com{item.lat},${item.lon}" target="_blank" class="btn-map">📍 GOOGLE MAPS</a>
                `;
                box.appendChild(card);
            });

            document.getElementById('s-count').innerText = sCount;
            document.getElementById('a-count').innerText = aCount;

        } catch (error) {
            document.getElementById('display').innerHTML = `
                <div class="error-msg">
                    <b>Ulanishda xatolik!</b><br>
                    Firebase Rules ochiqligini tekshiring.<br>
                    <small>${error.message}</small>
                </div>`;
        }
    }

    // Har 5 soniyada yangilash
    setInterval(loadData, 5000);
    loadData();
</script>
</body>
</html>
