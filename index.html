<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN | Parkent Monitoring</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { transition: 0.3s; background: #f1f5f9; }
        .dark body { background: #020617; color: white; }
        .card { background: white; border-radius: 24px; padding: 20px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .dark .card { background: #1e293b; border: 1px solid #334155; }
        .tab-active { background: #2563eb; color: white; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
        <div>
            <h1 class="text-2xl font-black text-blue-600 uppercase">Admin Kontrol</h1>
            <p class="text-xs font-bold opacity-50">Parkent Tuman Hokimligi</p>
        </div>
        <div class="flex items-center gap-6">
            <div id="a-clock" class="text-2xl font-mono font-bold tracking-tighter">00:00:00</div>
            <button onclick="document.documentElement.classList.toggle('dark')" class="p-3 bg-white dark:bg-slate-800 rounded-2xl shadow-sm">🌓</button>
        </div>
    </div>

    <div class="max-w-6xl mx-auto flex gap-2 mb-6 overflow-x-auto pb-2">
        <button onclick="load('ALL')" class="px-6 py-2 rounded-xl font-bold bg-white dark:bg-slate-800 shadow-sm border dark:border-slate-700">BARCHASI</button>
        <button onclick="load('SOS')" class="px-6 py-2 rounded-xl font-bold bg-red-100 text-red-600 shadow-sm border border-red-200">SOS</button>
        <button onclick="load('TEZ_YORDAM')" class="px-6 py-2 rounded-xl font-bold bg-blue-100 text-blue-600 shadow-sm border border-blue-200">TEZ YORDAM</button>
    </div>

    <div id="display" class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

    <footer class="max-w-6xl mx-auto mt-20 border-t border-slate-300 dark:border-slate-800 pt-10 pb-10">
        <div class="flex flex-col md:flex-row justify-between items-center gap-6 text-center md:text-left">
            <div>
                <p class="text-sm font-bold">Admin: <span class="text-blue-600">Parkent Tuman Hokimligi</span></p>
                <p class="text-xs opacity-50">Dasturchi: [Ismingizni kiriting]</p>
            </div>
            <div class="space-y-3">
                <button onclick="alert('Tizim adminga xabar yuborildi')" class="bg-red-50 dark:bg-red-950 text-red-600 px-6 py-3 rounded-2xl font-bold text-[10px] uppercase tracking-widest border border-red-200">Tizim muammosi uchun murojaat</button>
                <p class="text-[9px] opacity-30 font-black">© 2026 BEK_BOLA MODERN SYSTEM</p>
            </div>
        </div>
    </footer>

    <script>
        const DB_URL = "https://bek-bola-default-rtdb.europe-west1.firebasedatabase.app/murojaatlar.json";

        async function load(filter = 'ALL') {
            const res = await fetch(DB_URL);
            const data = await res.json();
            const box = document.getElementById('display');
            box.innerHTML = "";

            if(!data) return;

            Object.keys(data).reverse().forEach(id => {
                const item = data[id];
                if(filter !== 'ALL' && item.type !== filter) return;

                const card = document.createElement('div');
                card.className = `card border-l-8 ${item.type === 'SOS' ? 'border-red-600' : 'border-blue-600'}`;
                card.innerHTML = `
                    <p class="text-[10px] font-bold opacity-40 uppercase">${item.time}</p>
                    <h3 class="text-xl font-black my-2">${item.type}</h3>
                    <div class="flex gap-2 mt-4">
                        <a href="https://www.google.com/maps?q=${item.lat},${item.lon}" target="_blank" class="flex-1 bg-slate-900 text-white text-center py-2 rounded-xl text-xs font-bold uppercase">Xaritada ko'rish</a>
                        <button onclick="del('${id}')" class="px-3 bg-red-50 text-red-600 rounded-xl">🗑</button>
                    </div>
                `;
                box.appendChild(card);
            });
        }

        async function del(id) {
            if(confirm("O'chirilsinmi?")) {
                await fetch(`https://bek-bola-default-rtdb.europe-west1.firebasedatabase.app/murojaatlar/${id}.json`, { method: 'DELETE' });
                load();
            }
        }

        setInterval(() => { document.getElementById('a-clock').innerText = new Date().toLocaleTimeString('uz-UZ'); }, 1000);
        setInterval(() => load(), 5000);
        load();
    </script>
</body>
</html>
