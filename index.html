<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN | Parkent Monitoring</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { transition: 0.3s; -webkit-user-select: none; user-select: none; }
        .filter-btn.active { background: #3b82f6; color: white; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen p-4 md:p-10">

    <header class="max-w-6xl mx-auto flex justify-between items-center bg-white dark:bg-slate-900 p-6 rounded-3xl shadow-xl mb-8">
        <div>
            <h1 class="text-xl font-black uppercase tracking-tighter text-blue-600">Situatsion Markaz</h1>
            <p class="text-[10px] font-bold opacity-50">Parkent Tuman Hokimligi</p>
        </div>
        <div class="flex items-center gap-6">
            <div id="admin-clock" class="font-mono font-bold text-lg hidden md:block">00:00:00</div>
            <button onclick="document.documentElement.classList.toggle('dark')" class="p-3 bg-slate-100 dark:bg-slate-800 rounded-2xl">🌓</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto">
        <div class="flex gap-2 mb-8 overflow-x-auto pb-2">
            <button onclick="setFilter('ALL')" class="filter-btn active px-6 py-3 rounded-2xl font-bold bg-white dark:bg-slate-900 shadow-sm border dark:border-slate-800">BARCHASI</button>
            <button onclick="setFilter('SOS')" class="filter-btn px-6 py-3 rounded-2xl font-bold bg-white dark:bg-slate-900 shadow-sm border dark:border-slate-800">SOS</button>
            <button onclick="setFilter('TEZ_YORDAM')" class="filter-btn px-6 py-3 rounded-2xl font-bold bg-white dark:bg-slate-900 shadow-sm border dark:border-slate-800">TEZ YORDAM</button>
        </div>

        <div id="display" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <footer class="max-w-6xl mx-auto mt-20 border-t dark:border-slate-800 pt-10 pb-20">
        <div class="flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-center md:text-left text-sm">
                <b class="text-blue-600 uppercase">Loyihachi:</b> <span class="font-bold">Javohir_Mirtojiyev</span><br>
                <b class="text-blue-600 uppercase">Murojaat:</b> <span class="font-bold">+998 (93) 794-27-01</span>
            </div>
            <div class="text-center md:text-right">
                <button onclick="alert('Tizim muammosi bo\'yicha adminga xabar yuborildi!')" class="bg-red-50 dark:bg-red-950 text-red-600 px-6 py-3 rounded-2xl font-bold text-xs uppercase tracking-widest border border-red-200 dark:border-red-900">Tizimda xatolik bormi? Murojaat qiling</button>
                <p class="mt-4 text-[10px] opacity-40 uppercase font-black">2025-2026 BEK_BOLA © PARKENT Smart City</p>
            </div>
        </div>
    </footer>

    <script>
        const DB_URL = "https://bek-bola-default-rtdb.europe-west1.firebasedatabase.app/murojaatlar.json";
        let currentFilter = 'ALL';

        function setFilter(f) {
            currentFilter = f;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            loadData();
        }

        async function loadData() {
            const res = await fetch(DB_URL);
            const data = await res.json();
            const box = document.getElementById('display');
            box.innerHTML = "";

            if (!data) return;

            Object.keys(data).reverse().forEach(id => {
                const item = data[id];
                if (currentFilter !== 'ALL' && item.type !== currentFilter) return;

                const card = document.createElement('div');
                card.className = `bg-white dark:bg-slate-900 p-6 rounded-[30px] border-l-8 shadow-xl ${item.type === 'SOS' ? 'border-red-600' : 'border-blue-600'}`;
                card.innerHTML = `
                    <p class="text-[10px] opacity-50 font-bold mb-2 uppercase">${item.time}</p>
                    <h3 class="text-xl font-black mb-4">${item.type}</h3>
                    <a href="https://www.google.com/maps?q=${item.lat},${item.lon}" target="_blank" class="block text-center bg-blue-600 text-white py-3 rounded-2xl font-bold uppercase text-xs">Xaritada Ko'rish</a>
                    <button onclick="deleteMsg('${id}')" class="w-full mt-2 text-[10px] font-bold opacity-30 hover:opacity-100">O'CHIRISH</button>
                `;
                box.appendChild(card);
            });
        }

        setInterval(() => {
            document.getElementById('admin-clock').innerText = new Date().toLocaleTimeString('uz-UZ');
        }, 1000);

        setInterval(loadData, 5000);
        loadData();

        async function deleteMsg(id) {
            if(!confirm("O'chirilsinmi?")) return;
            await fetch(`https://bek-bola-default-rtdb.europe-west1.firebasedatabase.app/murojaatlar/${id}.json`, { method: 'DELETE' });
            loadData();
        }
    </script>
</body>
</html>
