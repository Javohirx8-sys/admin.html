<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITUATSION MARKAZ | BEK_BOLA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .digital-font { font-family: 'Orbitron', sans-serif; }
        .alert-pulse { animation: border-pulse 2s infinite; }
        @keyframes border-pulse {
            0% { border-color: rgba(239, 68, 68, 0.5); }
            50% { border-color: rgba(239, 68, 68, 1); }
            100% { border-color: rgba(239, 68, 68, 0.5); }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center bg-slate-900 p-6 rounded-3xl border border-slate-800 shadow-2xl mb-8">
            <div class="text-center md:text-left mb-4 md:mb-0">
                <h1 class="text-2xl font-black text-blue-500 tracking-widest uppercase digital-font">Situatsion Markaz</h1>
                <p class="text-slate-400 text-sm">Parkent tumani favqulodda monitoring tizimi</p>
            </div>
            <div class="flex gap-4">
                <div class="bg-slate-800 p-4 rounded-2xl text-center min-w-[100px]">
                    <p class="text-xs text-slate-500 uppercase">🆘 SOS</p>
                    <p id="s-count" class="text-2xl font-bold text-red-500 digital-font">0</p>
                </div>
                <div class="bg-slate-800 p-4 rounded-2xl text-center min-w-[100px]">
                    <p class="text-xs text-slate-500 uppercase">🚑 TEZ YORDAM</p>
                    <p id="a-count" class="text-2xl font-bold text-blue-500 digital-font">0</p>
                </div>
            </div>
        </div>

        <div id="display" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>

    <script>
        const DB_URL = "https://bek-bola-default-rtdb.europe-west1.firebasedatabase.app/murojaatlar.json";

        async function loadData() {
            try {
                const response = await fetch(DB_URL);
                const data = await response.json();
                const box = document.getElementById('display');
                
                let sCount = 0; let aCount = 0;

                if (!data) {
                    box.innerHTML = `<div class="col-span-full text-center py-20 opacity-20 text-2xl uppercase tracking-widest">Hozircha murojaatlar yo'q</div>`;
                    document.getElementById('s-count').innerText = 0;
                    document.getElementById('a-count').innerText = 0;
                    return;
                }

                box.innerHTML = "";
                Object.keys(data).reverse().forEach(id => {
                    const item = data[id];
                    if (item.type === 'SOS') sCount++; else aCount++;

                    const isSOS = item.type === 'SOS';
                    const card = document.createElement('div');
                    card.className = `bg-slate-900 p-6 rounded-3xl border-2 ${isSOS ? 'border-red-600 alert-pulse shadow-[0_0_20px_rgba(239,68,68,0.2)]' : 'border-blue-600 shadow-[0_0_20px_rgba(37,99,235,0.2)]'}`;
                    
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-[10px] bg-slate-800 px-2 py-1 rounded-full text-slate-400 font-mono italic">${item.time}</span>
                            <button onclick="deleteItem('${id}')" class="text-slate-600 hover:text-red-400 transition-colors text-xl">&times;</button>
                        </div>
                        <h2 class="text-2xl font-black mb-2 flex items-center gap-2">
                            ${isSOS ? '🆘 SOS' : '🚑 TEZ YORDAM'}
                        </h2>
                        <div class="space-y-3">
                            <p class="text-sm text-slate-400">Holati: <span class="text-green-400 font-bold">Faol</span></p>
                            <a href="https://www.google.com/maps?q=${item.lat},${item.lon}" target="_blank" 
                               class="block w-full text-center bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all shadow-lg active:scale-95">
                               📍 XARITADA KO'RISH
                            </a>
                        </div>
                    `;
                    box.appendChild(card);
                });

                document.getElementById('s-count').innerText = sCount;
                document.getElementById('a-count').innerText = aCount;

            } catch (error) {
                console.error("Xatolik:", error);
            }
        }

        async function deleteItem(id) {
            if(!confirm("Murojaatni o'chirmoqchimisiz?")) return;
            const deleteUrl = `https://bek-bola-default-rtdb.europe-west1.firebasedatabase.app/murojaatlar/${id}.json`;
            await fetch(deleteUrl, { method: 'DELETE' });
            loadData();
        }

        setInterval(loadData, 5000);
        loadData();
    </script>
</body>
</html>
