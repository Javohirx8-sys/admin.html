<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>BEK_BOLA ADMIN</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; }
        .card { background: #1e293b; padding: 15px; border-radius: 15px; margin-bottom: 10px; border-left: 5px solid #0a5cff; }
        .btn-map { background: #22c55e; color: white; text-decoration: none; padding: 10px; display: inline-block; border-radius: 8px; margin-top: 10px; }
        .badge { background: red; padding: 5px 10px; border-radius: 10px; }
    </style>
</head>
<body>
    <h2>🛰 Situatsion Markaz</h2>
    <div id="stats">SOS: <span id="s-count" class="badge">0</span> | Tez Yordam: <span id="a-count" class="badge" style="background:blue;">0</span></div>
    <hr>
    <div id="data">Yuklanmoqda...</div>

    <script>
        const dbURL = "https://bek-bola-default-rtdb.europe-west1.firebasedatabase.app";

        async function load() {
            const res = await fetch(`${dbURL}/alerts.json`);
            const data = await res.json();
            const box = document.getElementById('data');
            box.innerHTML = "";
            let s=0, a=0;

            if(data) {
                Object.keys(data).reverse().forEach(id => {
                    const it = data[id];
                    if(it.type === 'SOS') s++; else a++;
                    
                    const d = document.createElement('div');
                    d.className = 'card';
                    d.innerHTML = `
                        <b>${it.type}</b> | ${it.time}<br>
                        <a href="https://www.google.com{it.lat},${it.lon}" class="btn-map" target="_blank">📍 Xaritada ko'rish</a>
                    `;
                    box.appendChild(d);
                });
            }
            document.getElementById('s-count').innerText = s;
            document.getElementById('a-count').innerText = a;
        }
        setInterval(load, 5000); load();
    </script>
</body>
</html>
