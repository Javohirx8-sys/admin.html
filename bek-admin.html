<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><title>CONTROL PANEL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; }
        .alert-card { border: 1px solid #0f0; padding: 15px; margin: 10px 0; background: rgba(0, 255, 0, 0.1); display: flex; justify-content: space-between; align-items: center; }
        .sos-alert { background: rgba(255, 0, 0, 0.2); border-color: red; color: red; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        .btn { background: #0f0; color: #000; padding: 10px; border: none; cursor: pointer; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <h1>SYSTEM MONITOR [bek-bola]</h1>
    <div id="display">Awaiting signals...</div>

<script>
    firebase.initializeApp({ databaseURL: "https://bek-bola-default-rtdb.europe-west1.firebasedatabase.app" });
    const db = firebase.database();

    db.ref('alerts/').on('value', snap => {
        const container = document.getElementById('display');
        container.innerHTML = "";
        const data = snap.val();
        if(data) {
            Object.keys(data).reverse().forEach(id => {
                const a = data[id];
                const isSos = a.type === 'SOS' ? 'sos-alert' : '';
                container.innerHTML += `
                    <div class="alert-card ${isSos}">
                        <div>
                            <strong>[${a.type}]</strong><br>
                            Time: ${a.time}<br>
                            GPS: ${a.lat.toFixed(4)}, ${a.lng.toFixed(4)}
                        </div>
                        <a href="https://www.google.com/maps?q=${a.lat},${a.lng}" target="_blank" class="btn">VIEW MAP</a>
                        <button onclick="firebase.database().ref('alerts/${id}').remove()" class="btn" style="background:grey">DONE</button>
                    </div>`;
            });
        }
    });
</script>
</body>
</html>
